<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #24292e;
      --keyword: #d73a49;
      --string: #e67e22; 
      --comment: #6a737d;
      --builtin: #005cc5;
      --line-num-bg: #f8f8f8;
      --line-num-text: #999;
      --accent-green: #28a745;
      --accent-red: #cb2431;
      --accent-blue: #0366d6;
    }

    body { font-family: -apple-system, system-ui, sans-serif; margin: 20px; background: #eee; color: #333; }
    h2 { margin-top: 0; font-weight: 600; }

    .editor-container {
      display: flex; position: relative; width: 100%; height: 450px;
      border: 1px solid #ddd; border-radius: 6px; background: var(--bg-color);
      overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    #line-numbers {
      width: 45px; padding: 15px 5px; background: var(--line-num-bg);
      color: var(--line-num-text); font-family: 'Fira Code', monospace;
      font-size: 14px; line-height: 1.6; text-align: right; border-right: 1px solid #ddd;
    }

    .editor-wrapper { position: relative; flex-grow: 1; height: 100%; }

    #code, #highlighter {
      margin: 0; padding: 15px; font-family: 'Fira Code', monospace;
      font-size: 14px; line-height: 1.6; white-space: pre; position: absolute;
      top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box;
      outline: none; border: none; overflow: auto;
    }

    #code { z-index: 2; background: transparent; color: transparent; caret-color: #333; resize: none; }
    #highlighter { z-index: 1; color: var(--text-color); pointer-events: none; }

    .hl-keyword { color: var(--keyword); font-weight: bold; }
    .hl-string  { color: var(--string); }
    .hl-comment { color: var(--comment); font-style: italic; }
    .hl-builtin { color: var(--builtin); }

    .controls { margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 16px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; font-size: 14px; font-weight: 500; }
    #runBtn { background: var(--accent-green); color: white; border-color: #218838; }
    #stopBtn { color: var(--accent-red); border-color: #d1d1d1; }
    pre#output { background: #1e1e1e; color: #f0f0f0; padding: 15px; border-radius: 6px; min-height: 120px; max-height: 300px; overflow-y: auto; font-family: monospace; border: 1px solid #333; }
  </style>
</head>
<body>

<h2>Python Editor</h2>

<div class="editor-container">
  <div id="line-numbers"></div>
  <div class="editor-wrapper">
    <div id="highlighter"></div>
    <textarea id="code" spellcheck="false" wrap="off">print("Hello World!")</textarea>
  </div>
</div>

<div class="controls">
  <button id="runBtn" onclick="runCode()" disabled>Loading...</button>
  <button id="stopBtn" onclick="resetEngine()">Stop / Reset</button>
  <div style="flex-grow: 1;"></div>
  <button onclick="copyCode()">Copy</button>
  <button onclick="downloadCode()">Download</button>
</div>

<h3>Output:</h3>
<pre id="output">Initializing...</pre>

<script>
let pyodide;
const codeArea = document.getElementById("code");
const highlighter = document.getElementById("highlighter");
const lineNumbers = document.getElementById("line-numbers");
const output = document.getElementById("output");
const runBtn = document.getElementById("runBtn");

// --- HIGHLIGHTER ---
function applyHighlight(text) {
    let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const patterns = [
        { name: 'comment', regex: /#.*$/gm },
        { name: 'string',  regex: /(['"])(?:(?=(\\?))\2.)*?\1/g },
        { name: 'keyword', regex: /\b(def|class|if|else|elif|for|while|return|import|from|try|except|as|with|in|is|not|and|or|lambda|pass|break|continue)\b/g },
        { name: 'builtin', regex: /\b(print|input|len|range|str|int|float|list|dict|set|type|sum|max|min)\b/g }
    ];
    let parts = [{ text: html, isToken: false }];
    patterns.forEach(p => {
        let newParts = [];
        parts.forEach(part => {
            if (part.isToken) newParts.push(part);
            else {
                let lastIdx = 0, m;
                while ((m = p.regex.exec(part.text)) !== null) {
                    if (m.index > lastIdx) newParts.push({ text: part.text.substring(lastIdx, m.index), isToken: false });
                    newParts.push({ text: `<span class="hl-${p.name}">${m[0]}</span>`, isToken: true });
                    lastIdx = p.regex.lastIndex;
                }
                if (lastIdx < part.text.length) newParts.push({ text: part.text.substring(lastIdx), isToken: false });
            }
        });
        parts = newParts;
    });
    return parts.map(p => p.text).join("");
}

function updateEditor() {
    highlighter.innerHTML = applyHighlight(codeArea.value) + "\n";
    const lines = codeArea.value.split('\n');
    let numStr = '';
    for (let i = 1; i <= Math.max(lines.length, 20); i++) {
        numStr += (i > lines.length) ? `<span style="opacity:0.2">${i}</span><br>` : `${i}<br>`;
    }
    lineNumbers.innerHTML = numStr;
    localStorage.setItem('pySave', codeArea.value);
}

codeArea.addEventListener('input', updateEditor);
codeArea.addEventListener('scroll', () => { highlighter.scrollTop = lineNumbers.scrollTop = codeArea.scrollTop; highlighter.scrollLeft = codeArea.scrollLeft; });

// --- ENGINE + FULL STD LIB GUARD ---
async function setupPyodide() {
    runBtn.disabled = true;
    try {
        pyodide = await loadPyodide();
        window.update_output = (t) => { output.textContent += t; output.scrollTop = output.scrollHeight; };
        
        await pyodide.runPythonAsync(`
import sys, builtins, js, importlib

def reset_streams():
    class Stream:
        def write(self, s): js.update_output(s)
        def flush(self): pass
    sys.stdout = sys.stderr = Stream()

reset_streams()
builtins.input = lambda msg="": js.prompt(msg)

# --- ADVANCED IMPORT GUARD ---
original_import = builtins.__import__

def guarded_import(name, globals=None, locals=None, fromlist=(), level=0):
    base_name = name.split('.')[0]
    
    # Check if module is already loaded or is a known built-in
    is_builtin = base_name in sys.builtin_module_names or base_name in sys.modules
    
    # Attempt to see if it's in the standard library path
    is_stdlib = False
    try:
        spec = importlib.util.find_spec(base_name)
        if spec is not None:
            is_stdlib = True
    except:
        pass

    # If it's not builtin and not stdlib, it's likely an external pip request
    if not (is_builtin or is_stdlib):
        raise ImportError(f"\\n[!] Blocked: '{name}' is an external package and cannot be used here.")
    
    return original_import(name, globals, locals, fromlist, level)

builtins.__import__ = guarded_import
        `);
        runBtn.disabled = false;
        runBtn.textContent = "Run";
        output.textContent = "Python Ready (Standard Library Unlocked).\n";
    } catch (err) { output.textContent = "Error: " + err; }
}

async function runCode() {
    output.textContent = "";
    await pyodide.runPythonAsync("reset_streams()");
    try {
        await pyodide.runPythonAsync(codeArea.value);
    } catch (err) { output.textContent += "\n" + err; }
}

function resetEngine() { if(confirm("Reset?")) setupPyodide(); }
function copyCode() { navigator.clipboard.writeText(codeArea.value); alert("Copied!"); }
function downloadCode() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([codeArea.value], {type:'text/plain'}));
    a.download = 'code.py'; a.click();
}

window.onload = () => {
    const s = localStorage.getItem('pySave');
    if(s) codeArea.value = s;
    updateEditor();
    setupPyodide();
};
</script>
</body>
</html>
