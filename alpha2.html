<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #ffffff; --text-color: #24292e; --keyword: #d73a49;
      --string: #e67e22; --comment: #6a737d; --builtin: #005cc5;
      --line-num-bg: #f8f8f8; --line-num-text: #999; --accent-green: #28a745;
    }
    body { font-family: sans-serif; margin: 20px; background: #eee; }
    .editor-container {
      display: flex; height: 400px; border: 1px solid #ddd; border-radius: 6px;
      background: var(--bg-color); overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    #line-numbers {
      width: 45px; padding: 15px 5px; background: var(--line-num-bg);
      color: var(--line-num-text); font-family: monospace; font-size: 14px;
      line-height: 1.6; text-align: right; border-right: 1px solid #ddd; overflow: hidden;
    }
    .editor-wrapper { position: relative; flex-grow: 1; }
    #code, #highlighter {
      margin: 0; padding: 15px; font-family: monospace; font-size: 14px;
      line-height: 1.6; white-space: pre; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; box-sizing: border-box; outline: none; border: none;
    }
    #code { z-index: 2; background: transparent; color: transparent; caret-color: #333; resize: none; }
    #highlighter { z-index: 1; color: var(--text-color); pointer-events: none; }
    .hl-keyword { color: var(--keyword); font-weight: bold; }
    .hl-string  { color: var(--string); }
    .hl-comment { color: var(--comment); font-style: italic; }
    .hl-builtin { color: var(--builtin); }

    .controls { margin: 15px 0; display: flex; gap: 8px; align-items: center; }
    button { padding: 8px 14px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
    #runBtn { background: var(--accent-green); color: white; border-color: #218838; font-weight: bold; }

    .output-grid { display: grid; grid-template-columns: 1fr 300px; gap: 10px; margin-top: 10px; }
    #canvas-container { 
        background: white; border: 1px solid #ccc; border-radius: 6px; 
        height: 350px; display: flex; align-items: center; justify-content: center;
        position: relative;
    }
    #turtle-canvas { background: white; }
    pre#output { 
        background: #1e1e1e; color: #f0f0f0; padding: 15px; border-radius: 6px; 
        height: 320px; overflow-y: auto; margin: 0; font-family: monospace; font-size: 12px;
    }
  </style>
</head>
<body>

<h2>Python Editor</h2>

<div class="editor-container">
  <div id="line-numbers"></div>
  <div class="editor-wrapper">
    <div id="highlighter"></div>
    <textarea id="code" spellcheck="false" wrap="off">import turtle

t = turtle.Turtle()
t.pencolor("orange")
t.speed(5)

for i in range(36):
    for _ in range(4):
        t.forward(100)
        t.left(90)
    t.left(10)</textarea>
  </div>
</div>

<div class="controls">
  <button id="runBtn" onclick="runCode()" disabled>Loading...</button>
  <button onclick="location.reload()">Stop / Clear</button>
  <div style="flex-grow:1"></div>
  <button onclick="downloadCode()">Download</button>
  <button onclick="copyCode()">Copy</button>
</div>

<div class="output-grid">
  <div id="canvas-container">
    <canvas id="turtle-canvas" width="450" height="330"></canvas>
  </div>
  <pre id="output">Initializing...</pre>
</div>

<script>
let pyodide;
const codeArea = document.getElementById("code");
const highlighter = document.getElementById("highlighter");
const lineNumbers = document.getElementById("line-numbers");
const output = document.getElementById("output");
const runBtn = document.getElementById("runBtn");
const canvas = document.getElementById("turtle-canvas");
const ctx = canvas.getContext("2d");

// --- 1. THE TURTLE ENGINE (JS SIDE) ---
function resetCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.beginPath();
}

// --- 2. EDITOR LOGIC ---
function updateEditor() {
    const val = codeArea.value;
    highlighter.innerHTML = val.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/\b(def|if|else|for|while|return|import|from|class)\b/g, '<span class="hl-keyword">$1</span>')
        .replace(/(['"])(.*?)\1/g, '<span class="hl-string">$1$2$1</span>')
        .replace(/#.*$/gm, '<span class="hl-comment">$&</span>')
        .replace(/\b(print|input|range|len|str|int)\b/g, '<span class="hl-builtin">$1</span>') + "\n";
    
    const lines = val.split('\n');
    let numHtml = '';
    for (let i = 1; i <= Math.max(lines.length, 18); i++) {
        numHtml += (i > lines.length) ? `<span style="opacity:0.2">${i}</span><br>` : `${i}<br>`;
    }
    lineNumbers.innerHTML = numHtml;
}

codeArea.addEventListener('input', updateEditor);
codeArea.addEventListener('scroll', () => { highlighter.scrollTop = lineNumbers.scrollTop = codeArea.scrollTop; });

// --- 3. PYODIDE SETUP ---
async function setupPyodide() {
    try {
        pyodide = await loadPyodide();
        // Inject a custom turtle.py directly into the virtual filesystem
        pyodide.FS.writeFile("turtle.py", `
import js
import math

class Turtle:
    def __init__(self):
        self.x, self.y = 225, 165
        self.angle = 0
        self.pen = True
        self.color = "black"
        js.console.log("Turtle Initialized")

    def forward(self, dist):
        nx = self.x + dist * math.cos(math.radians(self.angle))
        ny = self.y - dist * math.sin(math.radians(self.angle))
        if self.pen:
            js.draw_line(self.x, self.y, nx, ny, self.color)
        self.x, self.y = nx, ny

    def left(self, deg): self.angle += deg
    def right(self, deg): self.angle -= deg
    def pencolor(self, c): self.color = c
    def penup(self): self.pen = False
    def pendown(self): self.pen = True
    def speed(self, s): pass # Visual only

def TurtleScreen(*args): pass
`);
        window.draw_line = (x1, y1, x2, y2, color) => {
            ctx.strokeStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        };
        
        runBtn.disabled = false;
        runBtn.textContent = "Run";
        output.textContent = "Engine Ready.\n";
        updateEditor();
    } catch (e) { output.textContent = "Error: " + e; }
}

async function runCode() {
    output.textContent = "";
    resetCanvas();
    try {
        await pyodide.runPythonAsync(codeArea.value);
    } catch (err) { output.textContent = err; }
}

function downloadCode() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([codeArea.value], {type:'text/plain'}));
    a.download = 'art.py'; a.click();
}

function copyCode() { navigator.clipboard.writeText(codeArea.value); }

function clearEditor() { if(confirm("Clear?")) { codeArea.value = ""; updateEditor(); } }

window.onload = setupPyodide;
</script>
</body>
</html>
