<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Alpha 2 - Fixed</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #24292e;
      --keyword: #d73a49;
      --string: #032f62;
      --comment: #6a737d;
      --builtin: #005cc5;
    }

    body { font-family: sans-serif; margin: 20px; background: #eee; }
    
    .editor-wrapper {
      position: relative;
      width: 100%;
      height: 400px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: var(--bg-color);
      overflow: hidden;
    }

    #code, #highlighter {
      margin: 0;
      padding: 15px;
      font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      outline: none;
      border: none;
    }

    #code {
      z-index: 2;
      background: transparent;
      color: transparent;
      caret-color: black;
      resize: none;
    }

    #highlighter {
      z-index: 1;
      color: var(--text-color);
      overflow-y: auto;
      pointer-events: none;
    }

    /* Syntax Colors */
    .hl-keyword { color: var(--keyword); font-weight: bold; }
    .hl-string  { color: var(--string); }
    .hl-comment { color: var(--comment); font-style: italic; }
    .hl-builtin { color: var(--builtin); }

    .controls { margin-top: 15px; display: flex; gap: 10px; }
    button { padding: 8px 20px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; }
    #runBtn { background: #28a745; color: white; font-weight: bold; }
    #runBtn:disabled { background: #94d3a2; }
    
    pre#output { 
      background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 6px; 
      min-height: 100px; max-height: 300px; overflow-y: auto; font-family: monospace;
    }
  </style>
</head>
<body>

<h2>Python Editor</h2>

<div class="editor-wrapper">
  <div id="highlighter"></div>
  <textarea id="code" spellcheck="false">print("Hello world!")</textarea>
</div>

<div class="controls">
  <button id="runBtn" onclick="runCode()" disabled>Loading...</button>
  <button onclick="downloadCode()">Download</button>
  <button onclick="clearEditor()" style="color: red;">Clear</button>
</div>

<h3>Console:</h3>
<pre id="output"></pre>

<script>
let pyodide;
const codeArea = document.getElementById("code");
const highlighter = document.getElementById("highlighter");

// --- FIX: ONE-PASS HIGHLIGHTER ---
function applyHighlight(text) {
    // 1. Escape HTML
    let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // 2. Define patterns
    const patterns = [
        { name: 'comment', regex: /#.*$/gm },
        { name: 'string',  regex: /(['"])(?:(?=(\\?))\2.)*?\1/g },
        { name: 'keyword', regex: /\b(def|class|if|else|elif|for|while|return|import|from|try|except|as|with|in|is|not|and|or|lambda|pass|break|continue)\b/g },
        { name: 'builtin', regex: /\b(print|input|len|range|str|int|float|list|dict|set|type|sum|max|min)\b/g }
    ];

    // 3. Process the text in one go to prevent nested tags
    // We use a dummy character to mark parts we've already colored
    let parts = [{ text: html, isToken: false }];

    patterns.forEach(pattern => {
        let newParts = [];
        parts.forEach(part => {
            if (part.isToken) {
                newParts.push(part);
            } else {
                let lastIndex = 0;
                let match;
                while ((match = pattern.regex.exec(part.text)) !== null) {
                    // Push text before match
                    if (match.index > lastIndex) {
                        newParts.push({ text: part.text.substring(lastIndex, match.index), isToken: false });
                    }
                    // Push the matched token
                    newParts.push({ 
                        text: `<span class="hl-${pattern.name}">${match[0]}</span>`, 
                        isToken: true 
                    });
                    lastIndex = pattern.regex.lastIndex;
                }
                // Push remaining text
                if (lastIndex < part.text.length) {
                    newParts.push({ text: part.text.substring(lastIndex), isToken: false });
                }
            }
        });
        parts = newParts;
    });

    return parts.map(p => p.text).join("");
}

function syncEditor() {
    highlighter.innerHTML = applyHighlight(codeArea.value) + "\n";
    localStorage.setItem('pyEditor_save', codeArea.value);
}

// Event Listeners
codeArea.addEventListener('input', syncEditor);
codeArea.addEventListener('scroll', () => { highlighter.scrollTop = codeArea.scrollTop; });

// IDE Features
const pairs = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };
codeArea.addEventListener('keydown', function(e) {
    const start = this.selectionStart;
    const end = this.selectionEnd;
    const val = this.value;

    if (pairs[e.key]) {
        e.preventDefault();
        this.value = val.substring(0, start) + e.key + pairs[e.key] + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 1;
        syncEditor();
    }
    if (e.key === 'Tab') {
        e.preventDefault();
        this.value = val.substring(0, start) + "    " + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
        syncEditor();
    }
    if (e.key === 'Enter') {
        e.preventDefault();
        const lineStart = val.lastIndexOf("\n", start - 1) + 1;
        const currentLine = val.substring(lineStart, start);
        let indent = currentLine.match(/^\s*/)[0];
        if (currentLine.trimEnd().endsWith(":")) indent += "    ";
        this.value = val.substring(0, start) + "\n" + indent + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 1 + indent.length;
        syncEditor();
    }
});

// Utilities
function downloadCode() {
    const blob = new Blob([codeArea.value], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'script.py';
    a.click();
}

function clearEditor() {
    if(confirm("Clear code?")) { codeArea.value = ""; syncEditor(); }
}

// Pyodide Setup
async function setupPyodide() {
  pyodide = await loadPyodide();
  window.update_output = (text) => {
    document.getElementById("output").textContent += text;
  };
  await pyodide.runPythonAsync(`
import sys, builtins, js
def reset_streams():
    class Stream:
        def write(self, s): js.update_output(s)
        def flush(self): pass
    sys.stdout = sys.stderr = Stream()
reset_streams()
builtins.input = lambda msg="": js.prompt(msg)
  `);
  document.getElementById("runBtn").disabled = false;
  document.getElementById("runBtn").textContent = "Run Code";
}

async function runCode() {
  document.getElementById("output").textContent = "";
  await pyodide.runPythonAsync("reset_streams()");
  try { await pyodide.runPythonAsync(codeArea.value); } 
  catch (err) { document.getElementById("output").textContent += "\n" + err; }
}

window.onload = () => {
    const saved = localStorage.getItem('pyEditor_save');
    if (saved) codeArea.value = saved;
    syncEditor();
    setupPyodide();
};
</script>
</body>
</html>
