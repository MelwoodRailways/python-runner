<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor - Alpha 3</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #24292e;
      --keyword: #d73a49;
      --string: #e67e22; /* Trinket-style Orange */
      --comment: #6a737d;
      --builtin: #005cc5;
      --line-num-bg: #f0f0f0;
      --line-num-text: #999;
    }

    body { font-family: sans-serif; margin: 20px; background: #eee; color: #333; }
    
    .editor-container {
      display: flex;
      position: relative;
      width: 100%;
      height: 450px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: var(--bg-color);
      overflow: hidden;
    }

    /* Line Numbers Column */
    #line-numbers {
      width: 40px;
      padding: 15px 5px;
      background: var(--line-num-bg);
      color: var(--line-num-text);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      text-align: right;
      user-select: none;
      border-right: 1px solid #ddd;
      overflow: hidden;
    }

    /* The Editor Wrapper (Highlighter + Textarea) */
    .editor-wrapper {
      position: relative;
      flex-grow: 1;
      height: 100%;
    }

    #code, #highlighter {
      margin: 0;
      padding: 15px;
      font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre; /* Changed to pre for better line-number alignment */
      word-wrap: normal;
      overflow-x: auto;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      outline: none;
      border: none;
    }

    #code {
      z-index: 2;
      background: transparent;
      color: transparent;
      caret-color: black;
      resize: none;
    }

    #highlighter {
      z-index: 1;
      color: var(--text-color);
      pointer-events: none;
    }

    /* Syntax Colors */
    .hl-keyword { color: var(--keyword); font-weight: bold; }
    .hl-string  { color: var(--string); }
    .hl-comment { color: var(--comment); font-style: italic; }
    .hl-builtin { color: var(--builtin); }

    .controls { margin: 15px 0; display: flex; gap: 10px; }
    button { padding: 8px 20px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; transition: 0.2s; }
    button:hover { background: #f8f8f8; }
    #runBtn { background: #28a745; color: white; font-weight: bold; border-color: #218838; }
    #runBtn:disabled { background: #94d3a2; cursor: wait; }
    
    pre#output { 
      background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 6px; 
      min-height: 100px; max-height: 300px; overflow-y: auto; font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

<h2>Python Editor <small style="font-size: 14px; font-weight: normal; color: #666;">(v0.3 - Line Numbers & Orange Strings)</small></h2>

<div class="editor-container">
  <div id="line-numbers">1</div>
  <div class="editor-wrapper">
    <div id="highlighter"></div>
    <textarea id="code" spellcheck="false" wrap="off">print("Hello world!")
# Try typing a new line...</textarea>
  </div>
</div>

<div class="controls">
  <button id="runBtn" onclick="runCode()" disabled>Loading Pyodide...</button>
  <button onclick="downloadCode()">Download .py</button>
  <button onclick="clearEditor()" style="color: #d9534f;">Clear Code</button>
</div>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
let pyodide;
const codeArea = document.getElementById("code");
const highlighter = document.getElementById("highlighter");
const lineNumbers = document.getElementById("line-numbers");

// --- 1. SYNTAX HIGHLIGHTING (Tokenization) ---
function applyHighlight(text) {
    let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    const patterns = [
        { name: 'comment', regex: /#.*$/gm },
        { name: 'string',  regex: /(['"])(?:(?=(\\?))\2.)*?\1/g },
        { name: 'keyword', regex: /\b(def|class|if|else|elif|for|while|return|import|from|try|except|as|with|in|is|not|and|or|lambda|pass|break|continue)\b/g },
        { name: 'builtin', regex: /\b(print|input|len|range|str|int|float|list|dict|set|type|sum|max|min)\b/g }
    ];

    let parts = [{ text: html, isToken: false }];

    patterns.forEach(pattern => {
        let newParts = [];
        parts.forEach(part => {
            if (part.isToken) {
                newParts.push(part);
            } else {
                let lastIndex = 0;
                let match;
                while ((match = pattern.regex.exec(part.text)) !== null) {
                    if (match.index > lastIndex) {
                        newParts.push({ text: part.text.substring(lastIndex, match.index), isToken: false });
                    }
                    newParts.push({ text: `<span class="hl-${pattern.name}">${match[0]}</span>`, isToken: true });
                    lastIndex = pattern.regex.lastIndex;
                }
                if (lastIndex < part.text.length) {
                    newParts.push({ text: part.text.substring(lastIndex), isToken: false });
                }
            }
        });
        parts = newParts;
    });

    return parts.map(p => p.text).join("");
}

// --- 2. UPDATE VIEW & LINE NUMBERS ---
function updateEditor() {
    const text = codeArea.value;
    
    // Update Highlight
    highlighter.innerHTML = applyHighlight(text) + "\n";
    
    // Update Line Numbers
    const lines = text.split('\n').length;
    let lineNumHtml = '';
    for (let i = 1; i <= lines; i++) {
        lineNumHtml += i + '<br>';
    }
    lineNumbers.innerHTML = lineNumHtml;

    // Save
    localStorage.setItem('pyEditor_save', text);
}

// Sync scrolling for all layers
codeArea.addEventListener('scroll', () => {
    highlighter.scrollTop = codeArea.scrollTop;
    highlighter.scrollLeft = codeArea.scrollLeft;
    lineNumbers.scrollTop = codeArea.scrollTop;
});

codeArea.addEventListener('input', updateEditor);

// --- 3. KEYBOARD FEATURES ---
const pairs = { '(': ')', '[': ']', '{': '}', '"': '"', "'": "'" };

codeArea.addEventListener('keydown', function(e) {
    const start = this.selectionStart;
    const end = this.selectionEnd;
    const val = this.value;

    if (pairs[e.key]) {
        e.preventDefault();
        this.value = val.substring(0, start) + e.key + pairs[e.key] + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 1;
        updateEditor();
    }
    if (e.key === 'Tab') {
        e.preventDefault();
        this.value = val.substring(0, start) + "    " + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
        updateEditor();
    }
    if (e.key === 'Enter') {
        e.preventDefault();
        const lineStart = val.lastIndexOf("\n", start - 1) + 1;
        const currentLine = val.substring(lineStart, start);
        let indent = currentLine.match(/^\s*/)[0];
        if (currentLine.trimEnd().endsWith(":")) indent += "    ";
        this.value = val.substring(0, start) + "\n" + indent + val.substring(end);
        this.selectionStart = this.selectionEnd = start + 1 + indent.length;
        updateEditor();
    }
});

// --- 4. UTILITIES ---
function downloadCode() {
    const blob = new Blob([codeArea.value], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'script.py';
    a.click();
}

function clearEditor() {
    if(confirm("Are you sure you want to clear your code?")) {
        codeArea.value = "";
        updateEditor();
    }
}

// --- 5. PYODIDE CORE ---
async function setupPyodide() {
    try {
        pyodide = await loadPyodide();
        window.update_output = (text) => {
            document.getElementById("output").textContent += text;
        };
        await pyodide.runPythonAsync(`
import sys, builtins, js
def reset_streams():
    class Stream:
        def write(self, s): js.update_output(s)
        def flush(self): pass
    sys.stdout = sys.stderr = Stream()
reset_streams()
builtins.input = lambda msg="": js.prompt(msg)
        `);
        const btn = document.getElementById("runBtn");
        btn.disabled = false;
        btn.textContent = "Run Code";
        document.getElementById("output").textContent = "Python Ready.\n";
    } catch (e) {
        document.getElementById("output").textContent = "Error loading Pyodide: " + e;
    }
}

async function runCode() {
    document.getElementById("output").textContent = "";
    await pyodide.runPythonAsync("reset_streams()");
    try {
        await pyodide.runPythonAsync(codeArea.value);
    } catch (err) {
        document.getElementById("output").textContent += "\n" + err;
    }
}

window.onload = () => {
    const saved = localStorage.getItem('pyEditor_save');
    if (saved) codeArea.value = saved;
    updateEditor();
    setupPyodide();
};
</script>

</body>
</html>
