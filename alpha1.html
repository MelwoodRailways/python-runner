<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    body {
      font-family: monospace;
      margin: 20px;
    }
    textarea {
      width: 100%;
      height: 300px;
      font-family: monospace;
      font-size: 16px;
    }
    pre {
      background: #f0f0f0;
      padding: 10px;
      min-height: 150px;
      overflow-y: auto;
    }
    button {
      margin-top: 10px;
      padding: 5px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Python Editor</h2>

<textarea id="code">print("Hello world!")</textarea>
<br>
<button id="runBtn" onclick="runCode()" disabled>Run</button>
<button onclick="unlockThirdParty()">Enter Passcode</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
let pyodide;
let thirdPartyAllowed = false;

// Load Pyodide and set up environment
async function loadPyodideAndPackages() {
  pyodide = await loadPyodide();
  console.log("Pyodide loaded!");

  // Async setup for stdout streaming and restricted imports
  await pyodide.runPythonAsync(`
import sys
import builtins
import js

# Allowed standard library modules
ALLOWED_MODULES = {
    "asyncio", "math", "time", "sys", "random",
    "itertools", "functools", "collections", "re"
}

# Stream stdout to JS
class Stream:
    def __init__(self):
        self.content = ""
    def write(self, s):
        self.content += s
        js.update_output(self.content)
    def flush(self):
        pass

sys.stdout = Stream()
sys.stderr = Stream()

# Block imports not in whitelist
_real_import = builtins.__import__
def restricted_import(name, globals=None, locals=None, fromlist=(), level=0):
    if name not in ALLOWED_MODULES:
        raise ImportError(f"Import of '{name}' is blocked. Request passcode to unlock.")
    return _real_import(name, globals, locals, fromlist, level)

builtins.__import__ = restricted_import
`);

  // Enable Run button
  document.getElementById("runBtn").disabled = false;
}

// JS function to stream output
window.update_output = (text) => {
  const output = document.getElementById("output");
  output.textContent = text;
  output.scrollTop = output.scrollHeight;
};

// Run code safely
async function runCode() {
  const output = document.getElementById("output");
  if (!pyodide) {
    output.textContent = "Python environment is still loading. Please wait...";
    return;
  }

  output.textContent = ""; // clear previous output
  const code = document.getElementById("code").value;

  try {
    await pyodide.runPythonAsync(code);
  } catch (err) {
    output.textContent += "\n" + err;
  }
}

// Unlock third-party packages
function unlockThirdParty() {
  const code = prompt("Enter passcode to allow third-party packages:");
  const correctPasscode = "CLASS123"; // set your passcode here

  if (code === correctPasscode) {
    thirdPartyAllowed = true;
    alert("Third-party modules are now unlocked for this session!");

    // Remove the restricted import in Pyodide
    pyodide.runPythonAsync(`
import builtins
builtins.__import__ = __import__  # restore normal import behavior
`).then(() => console.log("Imports unlocked"));
  } else {
    alert("Incorrect passcode!");
  }
}

// Optional: helper to load packages safely
async function safeLoadPackage(pkgName) {
  if (!thirdPartyAllowed) {
    alert("Third-party packages are blocked! Enter passcode to unlock.");
    return;
  }
  await pyodide.loadPackage(pkgName);
}

loadPyodideAndPackages();
</script>

</body>
</html>
