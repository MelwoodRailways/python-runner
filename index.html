<h1>Welcome to this Python editor</h1>
<p>Your code might not save in the browser. You can download it locally with the Download button.</p>

<div class="card">
  <label for="versionSelect">Choose version</label>

  <select id="versionSelect"></select>

  <button onclick="launchEditor()">
    Launch <span id="selectedVersion">latest</span>
  </button>
</div>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
    margin: 0;
    background: linear-gradient(135deg, #eef2f7, #d9e4f5);
    color: #222;
  }

  h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  p {
    font-size: 1.1em;
    margin-bottom: 30px;
    color: #555;
  }

  .card {
    display: inline-block;
    padding: 30px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  label {
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
  }

  select {
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 220px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border 0.2s;
  }

  select:focus {
    outline: none;
    border-color: #007bff;
  }

  button {
    display: block;
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #007bff, #0056b3);
    color: white;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 15px rgba(0,0,0,0.15);
  }

  #selectedVersion {
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    padding: 3px 8px;
    border-radius: 6px;
    margin-left: 5px;
  }
</style>

<script>
  const versions = [
    { name: "v2.0 (latest)", file: "editor.html" },
    //{ name: "v2.1 (beta)", file: "beta-editor.html" },
    //{ name: "v2.0", file: "version_2-0.html" },
    { name: "v1.0", file: "version_1-0.html" },
  ];

  const select = document.getElementById("versionSelect");
  const label = document.getElementById("selectedVersion");

  versions.forEach((version, index) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = version.name;
    select.appendChild(option);
  });

  select.addEventListener("change", () => {
    const selected = versions[select.value];
    label.textContent = selected.name;
  });

  function launchEditor() {
    const selected = versions[select.value];
    window.location.href = selected.file;
  }

  label.textContent = versions[0].name;
</script>
