<h1>Welcome to this Python editor</h1>
<p>Your code will not save. Remember to store it somewhere else!</p>

<!-- Version selector -->
<select id="versionSelect">
  <!-- Versions will be added here -->
</select>

<br><br>

<!-- Launch button -->
<button onclick="launchEditor()">
  Launch (<span id="selectedVersion">latest</span>)
</button>

<script>
  // List of versions (easy to expand)
  const versions = [
    { name: "Latest - v1.0", file: "editor.html" },
    { name: "Beta - v2.0", file: "beta-editor.html" },
    { name: "v1.0", file: "version_1-0.html" }
  ];

  const select = document.getElementById("versionSelect");
  const label = document.getElementById("selectedVersion");

  // Populate dropdown
  versions.forEach((version, index) => {
    const option = document.createElement("option");
    option.value = index;
    option.textContent = version.name;
    select.appendChild(option);
  });

  // Update button text when selection changes
  select.addEventListener("change", () => {
    const selected = versions[select.value];
    label.textContent = selected.name;
  });

  // Launch selected version
  function launchEditor() {
    const selected = versions[select.value];
    window.location.href = selected.file;
  }

  // Set default label
  label.textContent = versions[0].name;
</script>
