<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    header {
      padding: 10px;
      background: #222;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header button {
      padding: 5px 10px;
      font-size: 14px;
      cursor: pointer;
    }
    #container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #editor {
      flex: 1;
      padding: 10px;
      box-sizing: border-box;
      border-right: 1px solid #ccc;
      resize: none;
      font-family: monospace;
      font-size: 16px;
      width: 50%;
      height: 100%;
    }
    #console {
      flex: 1;
      padding: 10px;
      box-sizing: border-box;
      background: #f5f5f5;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 16px;
      width: 50%;
      height: 100%;
    }
    button.run-btn {
      margin-top: 10px;
      padding: 5px 15px;
      font-size: 16px;
      cursor: pointer;
    }
    .dark-mode {
      background: #121212;
      color: #e0e0e0;
    }
    .dark-mode #console {
      background: #1e1e1e;
      color: #e0e0e0;
    }
    .error {
      color: #ff5555;
    }
  </style>
</head>
<body>

<header>
  <h2>Python Editor</h2>
  <button id="toggleTheme">Dark Mode</button>
</header>

<div id="container">
  <textarea id="editor">print("Hello world!")</textarea>
  <div id="console"></div>
</div>

<button class="run-btn" onclick="runCode()">Run Code</button>

<script>
  let pyodide;
  let darkMode = false;

  // Load Pyodide
  async function loadPyodideAndPackages() {
    pyodide = await loadPyodide();
    console.log("Pyodide loaded!");
  }
  loadPyodideAndPackages();

  // Dark mode toggle
  document.getElementById("toggleTheme").addEventListener("click", () => {
    darkMode = !darkMode;
    document.body.classList.toggle("dark-mode", darkMode);
    document.getElementById("toggleTheme").textContent = darkMode ? "Light Mode" : "Dark Mode";
  });

  async function runCode() {
    const code = document.getElementById("editor").value;
    const outputDiv = document.getElementById("console");
    outputDiv.textContent = ""; // Clear previous output

    try {
      // Reset stdout
      pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

      // Set input function
      pyodide.globals.set("input", (msg) => prompt(msg || "Enter input:"));

      await pyodide.runPythonAsync(code);

      let stdout = pyodide.runPython("sys.stdout.getvalue()");
      outputDiv.textContent = stdout;

    } catch (err) {
      outputDiv.innerHTML = `<span class="error">${err}</span>`;
    }

    // Scroll to bottom
    outputDiv.scrollTop = outputDiv.scrollHeight;
  }
</script>

</body>
</html>
