<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <style>
    body {
      font-family: monospace;
      margin: 20px;
    }
    textarea {
      width: 100%;
      height: 300px;
      font-family: monospace;
      font-size: 16px;
    }
    pre {
      background: #f0f0f0;
      padding: 10px;
      min-height: 150px;
      overflow-y: auto;
    }
    button {
      margin-top: 10px;
      padding: 5px 15px;
      font-size: 16px;
      cursor: pointer;
    }
    footer {
      margin-top: 30px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>

<h2>Python Editor</h2>

<textarea id="code">print("Hello world!")</textarea>
<br>
<button onclick="runCode()">Run</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
let pyodide;

// Load Pyodide
async function loadPyodideAndPackages() {
  pyodide = await loadPyodide();
  console.log("Pyodide loaded!");
}
loadPyodideAndPackages();

// JS function for incremental output
window.update_output = (text) => {
  const output = document.getElementById("output");
  output.textContent = text;
  output.scrollTop = output.scrollHeight; // auto-scroll
};

async function runCode() {
  const code = document.getElementById("code").value;
  const output = document.getElementById("output");
  output.textContent = ""; // Clear previous output

  try {
    // Setup Python to stream stdout
    pyodide.runPython(`
import sys
import js

class Stream:
    def __init__(self):
        self.content = ""
    def write(self, s):
        self.content += s
        js.update_output(self.content)
    def flush(self):
        pass

sys.stdout = Stream()
sys.stderr = Stream()
`);

    // input() support via prompt()
    pyodide.globals.set("input", (msg) => prompt(msg || ""));

    // Run Python code
    await pyodide.runPythonAsync(code);

  } catch (err) {
    output.textContent += "\n" + err;
  }
}
</script>

</body>
</html>
